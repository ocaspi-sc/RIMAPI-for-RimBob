/api/v1/mods/configure:
  desc: Настраивает список активных модов и порядок их загрузки. Передайте массив ID пакетов в том порядке, в котором вы хотите их загрузить. Core (`ludeon.rimworld`) будет автоматически добавлен в начало, если он отсутствует. Установите `restart_game` в значение `true`, чтобы немедленно перезагрузить RimWorld и применить изменения.
  curl: |-
    **Example:**
    ```bash
    curl --request POST \
      --url http://localhost:8765/api/v1/mods/configure \
      --header 'content-type: application/json' \
      --data '{"package_ids":["brrainz.harmony","ludeon.rimworld","ludeon.rimworld.royalty","ludeon.rimworld.ideology","ludeon.rimworld.biotech","ludeon.rimworld.anomaly","ludeon.rimworld.odyssey","unlimitedhugs.hugslib","redeyedev.rimapi"],"restart_game":true}'
    ```
  request: |-
    **Request Body:**
    ```json
    {
      "package_ids": [
        "brrainz.harmony",
        "ludeon.rimworld",
        "ludeon.rimworld.royalty",
        "ludeon.rimworld.ideology",
        "ludeon.rimworld.biotech",
        "ludeon.rimworld.anomaly",
        "ludeon.rimworld.odyssey",
        "unlimitedhugs.hugslib",
        "redeyedev.rimapi"
      ],
      "restart_game": true
    }
    ```
  response: |-
    **Response:**
    ```json
    {
        "success": true,
        "data": null,
        "errors": [],
        "warnings": [],
        "timestamp": "2026-02-18T18:23:32.0000000Z"
    }
    ```
  method: POST
/api/v1/select:
  desc: |-
    Выбирает конкретный игровой объект (поселенца, здание, предмет и т. д.)
    на основе его типа и уникального идентификатора.
  curl: |-
    **Example:**
    ```bash
    curl --request POST \
    --url 'http://localhost:8765/api/v1/select?type=pawn&id=443'
    ```
  request: ''
  response: |-
    **Response:**
    ```json
    {
        "success": true,
        "errors": [],
        "warnings": [],
        "timestamp": "2025-12-08T19:13:29.997162Z"
    }
    ```
  method: POST
/api/v1/deselect:
  desc: |-
    Очищает текущее выделение в игре, снимая выделение с любых объектов
    и возвращая интерфейс в нейтральное состояние.
  curl: |-
    **Example:**
    ```bash
    curl --request POST \
    --url http://localhost:8765/api/v1/deselect
    ```
  request: ''
  response: |-
    **Response:**
    ```json
    {
        "success": true,
        "errors": [],
        "warnings": [],
        "timestamp": "2025-12-08T19:13:29.997162Z"
    }
    ```
  method: POST
/api/v1/open-tab:
  desc: |-
    Открывает определенную панель информации (вкладку) для выбранного в данный момент
    поселенца в окне осмотра игры. Эта конечная точка позволяет внешне
    просматривать подробную информацию о здоровье, снаряжении,
    потребностях, отношениях и других атрибутах поселенца — дублируя интерфейс вкладок,
    доступный при ручном осмотре персонажа в игре.
  curl: |-
    **Example:**
    ```bash
    curl --request POST \
    --url 'http://localhost:8765/api/v1/open-tab?name=health'
    ```
  request: ''
  response: |-
    **Response:**
    ```json
    {
        "success": true,
        "errors": [],
        "warnings": [],
        "timestamp": "2025-12-08T19:13:29.997162Z"
    }
    ```
  method: POST
