/api/v1/game/select-area:
  desc: |-
    Имитирует действие выделения рамкой в игровом мире (UI).
    Выбирает все выделяемые объекты (поселенцев, предметы и т. д.) внутри прямоугольника, заданного PositionA и PositionB.
  curl: |-
    **Example:**
    ```bash
    curl --request POST \
    --url http://localhost:8765/api/v1/game/select-area \
    --header 'Content-Type: application/json' \
    --data '{
        "position_a": { "x": 10, "y": 0, "z": 10 },
        "position_b": { "x": 20, "y": 0, "z": 20 }
    }'
    ```
  request: |-
    **Request Body:**
    ```json
    {
        "position_a": { "x": 10, "y": 0, "z": 10 },
        "position_b": { "x": 20, "y": 0, "z": 20 }
    }
    ```
  response: |-
    **Response:**
    ```json
    {
        "success": true,
        "data": "Area selected from (10, 0, 10) to (20, 0, 20). 5 objects selected.",
        "errors": [],
        "warnings": [],
        "timestamp": "2025-12-14T14:18:10.000Z"
    }
    ```
  method: POST
