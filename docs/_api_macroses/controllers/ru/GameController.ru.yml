title: '### :material-gamepad-variant: Игра'
desc: Этот контроллер обрабатывает общие игровые функции.
/api/v1/game/state:
  desc: Возвращает текущее состояние игры.
  curl: |-
    **Example:**
    ```bash
    curl --request GET \
    --url http://localhost:8765/api/v1/game/state
    ```
  request: ''
  response: |-
    **Response:**
    ```json
    {
        "success": true,
        "data": {
            "game_tick": 120,
            "colony_wealth": 4.0,
            "colonist_count": 3,
            "storyteller": "Cassandra",
            "is_paused": true
        },
        "errors": [],
        "warnings": [],
        "timestamp": "2025-12-11T19:39:28.6476222Z"
    }
    ```
  method: GET
/api/v1/game/speed:
  desc: |-
    Устанавливает текущую скорость игрового времени.

    !!! info
        **Значения скорости:**
        ```json
        `0`: Пауза
        `1`: Обычная скорость
        `2`: Быстрая скорость
        `3`: Очень быстрая скорость
        `4`: Ультра-быстрая (только в режиме разработчика)
        ```
  curl: |-
    **Example:**
    ```bash
    curl --request POST \
    --url "http://localhost:8765/api/v1/game/speed?speed=3"
    ```
  request: ''
  response: |-
    **Response:**
    ```json
    {
        "success": true,
        "data": "Game speed set to 3",
        "errors": [],
        "warnings": [],
        "timestamp": "2025-12-14T14:10:05.123Z"
    }
    ```
  method: POST
/api/v1/game/settings/run-in-background:
  desc: Получает текущее состояние настройки «Работа в фоновом режиме».
  curl: |-
    **Example:**
    ```bash
    curl --request GET \
    --url http://localhost:8765/api/v1/game/settings/run-in-background
    ```
  request: ''
  response: |-
    **Response:**
    ```json
    {
        "success": true,
        "data": true,
        "timestamp": "2025-12-11T19:46:05.7088803Z"
    }
    ```
  method: GET
/api/v1/game/settings/toggle/run-in-background:
  desc: Переключает или устанавливает настройку «Работа в фоновом режиме». Тело запроса определяет желаемое состояние.
  curl: |-
    **Example:**
    ```bash
    curl --request POST \
    --url http://localhost:8765/api/v1/game/settings/toggle/run-in-background \
    --header 'Content-Type: application/json' \
    --data 'true'
    ```
  request: ''
  response: |-
    **Response:**
    ```json
    {
        "success": true,
        "data": true,
        "timestamp": "2025-12-11T19:46:05.7088803Z"
    }
    ```
  method: POST
/api/v1/version:
  desc: |-
    Возвращает информацию о версии игры, мода REST API
    и самого API. Эта конечная точка предоставляет важные идентификационные
    метаданные, которые могут быть использованы для проверки совместимости, отладки
    и системной документации.
  curl: |-
    **Example:**
    ```bash
    curl --request GET \
    --url http://localhost:8765/api/v1/version
    ```
  request: ''
  response: |-
    **Response:**
    ```json
    {
        "success": true,
        "data": {
            "rim_world_version": "1.6.4633",
            "mod_version": "1.2.0",
            "api_version": "v1"
        },
        "errors": [],
        "warnings": [],
        "timestamp": "2025-12-10T18:52:09.0916968Z"
    }
    ```
  method: GET
