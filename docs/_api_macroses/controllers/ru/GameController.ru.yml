/api/v1/game/start:
  desc: |-
    Эта конечная точка запускает новую игру RimWorld с указанными
    параметрами конфигурации. Она инициализирует новый игровой мир с
    заданным рассказчиком, сложностью, настройками карты и параметрами
    генерации планеты.

    !!! info "Получение доступных опций"
        Имена рассказчиков, уровни сложности и другие значения определений можно
        получить из конечной точки `/api/v1/def/all`. Эта конечная точка предоставляет
        исчерпывающую информацию обо всех игровых определениях, включая:

        - **Определения рассказчиков**
        - **Настройки сложности**

        **Пример использования:**
        ```bash
        curl --request GET \
        --url http://localhost:8765/api/v1/def/all
        ```

        Ответ представляет собой большую структуру JSON из игры, она содержит
        категоризированные определения, которые можно использовать для
        заполнения параметров этого запроса на запуск игры.
